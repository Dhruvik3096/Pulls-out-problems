<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - PoCkEt WoRld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* Same CSS as login.html for consistency */
:root {
  --bg-base:      #080c14;
  --bg-card:      rgba(255,255,255,0.03);
  --border:       rgba(255,255,255,0.08);
  --border-glow:  rgba(99,179,237,0.4);
  --neon-blue:    #38bdf8;
  --neon-purple:  #a78bfa;
  --text-primary: #e2e8f0;
  --text-muted:   #64748b;
  --text-dim:     #475569;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
body::before {
  content: ''; position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
}
.glow-orb {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  filter: blur(120px); opacity: 0.15; z-index: 0;
}
.glow-1 { top: -200px; left: -200px; background: var(--neon-blue); }
.glow-2 { bottom: -200px; right: -200px; background: var(--neon-purple); }

.login-card {
  position: relative; z-index: 10;
  width: 100%; max-width: 460px;
  background: rgba(13,18,32,0.6);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.app-logo {
  text-align: center; margin-bottom: 24px;
}
.logo-icon {
  width: 56px; height: 56px; margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff;
  box-shadow: 0 0 30px rgba(56,189,248,0.5);
}
h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
p.sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; text-align: center; }

.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
}
.input-wrap { position: relative; }
.input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 15px; transition: color 0.2s;
}
.form-control {
  width: 100%; padding: 12px 16px 12px 42px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--text-primary); font-size: 14px;
  outline: none; transition: all 0.2s;
}
.form-control:focus {
  border-color: var(--border-glow); box-shadow: 0 0 0 4px rgba(56,189,248,0.1);
}
.form-control:focus + .input-icon, .form-control:not(:placeholder-shown) + .input-icon {
  color: var(--neon-blue);
}
.btn-login {
  width: 100%; padding: 14px; margin-top: 12px;
  background: linear-gradient(135deg, var(--neon-blue), #0ea5e9);
  color: #fff; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 0 20px rgba(56,189,248,0.4); transition: all 0.2s;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(56,189,248,0.6); }

.flash-message {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 500; margin-bottom: 20px;
}
.flash-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--neon-red); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>
<div class="glow-orb glow-1"></div>
<div class="glow-orb glow-2"></div>

<div class="login-card">
  <div class="app-logo">
    <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
  </div>

  <h2>Create an Account</h2>
  <p class="sub">Join PoCkEt WoRld to manage your stock efficiently.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="flash-message {% if category == 'error' %}flash-error{% else %}flash-info{% endif %}">
          <i class="fas {% if category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <i class="fas fa-user input-icon"></i>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
      </div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" name="email" class="form-control" placeholder="name@company.com" required>
      </div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Account Role</label>
      <div class="input-wrap">
        <i class="fas fa-id-badge input-icon"></i>
        <select name="role" class="form-control" style="padding-left: 42px; appearance: none;" required>
          <option value="shopkeeper">Shopkeeper</option>
          <option value="warehouse_manager">Warehouse Manager</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
          <option value="auditor">Auditor</option>
          <option value="supplier">Supplier</option>
        </select>
        <i class="fas fa-chevron-down" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; font-size: 12px;"></i>
      </div>
    </div>

    <div style="display: flex; gap: 12px;">
      <div class="form-group" style="flex: 1;">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
      </div>
      
      <div class="form-group" style="flex: 1;">
        <label class="form-label">Confirm</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat" required>
        </div>
      </div>
    </div>
    
    <button type="submit" class="btn-login">
      Create Account <i class="fas fa-arrow-right"></i>
    </button>
  </form>

  <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted);">
    Already have an account? <a href="{{ url_for('login') }}" style="color:var(--neon-blue);font-weight:600;text-decoration:none;">Sign in</a>
  </div>
</div>

</body>
</html>
