{% extends "base.html" %}
{% block title %}Add Product — PoCkEt WoRld{% endblock %}
{% block page_title %}Add Product{% endblock %}

{% block content %}
<div class="fade-up" style="max-width:560px;">
  <div style="margin-bottom:18px;">
    <a href="{{ url_for('dashboard') }}" style="color:var(--text-muted);font-size:13px;display:inline-flex;align-items:center;gap:6px;">
      <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);">
      <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(167,139,250,0.15));display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-plus" style="color:var(--neon-blue);font-size:18px;"></i>
      </div>
      <div>
        <div class="section-title">New Product</div>
        <div class="section-sub">Add a new item to the inventory</div>
      </div>
    </div>

    <form method="POST" autocomplete="off">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Product Name</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. MacBook Pro 16" required>
        </div>
        <div class="form-group">
          <label class="form-label">SKU</label>
          <input type="text" name="sku" class="form-control" placeholder="e.g. MBP-001" required>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-control" required>
            <option value="" disabled selected>Select category</option>
            <option>Electronics</option>
            <option>Peripherals</option>
            <option>Accessories</option>
            <option>Furniture</option>
            <option>Storage</option>
            <option>Networking</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Initial Stock</label>
          <input type="number" name="quantity" class="form-control" placeholder="0" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <select name="location" class="form-control">
            <option>Warehouse A</option>
            <option>Warehouse B</option>
            <option>Warehouse C</option>
            <option>Store Front</option>
          </select>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:10px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Product</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
